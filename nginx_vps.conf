server {
    listen 80;
    server_name sarker.shop www.sarker.shop;

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name sarker.shop www.sarker.shop;

    ssl_certificate /etc/letsencrypt/live/sarker.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sarker.shop/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass http://localhost:8080; # Point to the frontend container
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
