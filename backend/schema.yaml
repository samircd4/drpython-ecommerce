components:
  schemas:
    Address:
      type: object
      description: Matches the UI screenshot exactly.
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          type: string
          description: Receiver's Name
          maxLength: 100
        phone:
          type: string
          description: Receiver's Phone
          maxLength: 20
        address:
          type: string
          description: House no. / Building / Street
        division:
          type: string
        district:
          type: string
        sub_district:
          type: string
        address_type:
          $ref: '#/components/schemas/AddressTypeEnum'
        is_default:
          type: boolean
      required:
      - address
      - district
      - division
      - full_name
      - id
      - phone
      - sub_district
    AddressTypeEnum:
      enum:
      - Home
      - Office
      type: string
      description: |-
        * `Home` - Home
        * `Office` - Office
    Brand:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 50
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        logo:
          type: string
          format: uri
          nullable: true
      required:
      - id
      - name
    Cart:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - items
    CartItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          allOf:
          - $ref: '#/components/schemas/OrderProduct'
          readOnly: true
        variant:
          allOf:
          - $ref: '#/components/schemas/OrderVariant'
          readOnly: true
        product_id:
          type: integer
          writeOnly: true
        variant_id:
          type: integer
          writeOnly: true
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - id
      - product
      - variant
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        logo:
          type: string
          format: uri
          nullable: true
        parent:
          type: integer
          nullable: true
        children:
          type: array
          items:
            $ref: '#/components/schemas/SubCategory'
          readOnly: true
        breadcrumbs:
          type: array
          items:
            type: object
            additionalProperties: {}
          readOnly: true
      required:
      - breadcrumbs
      - children
      - id
      - name
    ChangePassword:
      type: object
      description: Serializer for password change endpoint.
      properties:
        old_password:
          type: string
        new_password:
          type: string
      required:
      - new_password
      - old_password
    Checkout:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        created_at:
          type: string
          format: date-time
          readOnly: true
        cart:
          type: integer
        shipping_address:
          type: integer
          nullable: true
        billing_address:
          type: integer
          nullable: true
      required:
      - cart
      - created_at
      - id
    ContactMessage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 254
        subject:
          type: string
          nullable: true
          maxLength: 255
        message:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - id
      - message
      - name
    Conversation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        customer:
          allOf:
          - $ref: '#/components/schemas/UserShort'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        last_message:
          type: string
          readOnly: true
        unread_count:
          type: string
          readOnly: true
      required:
      - created_at
      - customer
      - id
      - last_message
      - unread_count
      - updated_at
    Coupon:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 50
        discount_type:
          $ref: '#/components/schemas/DiscountTypeEnum'
        discount_value:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        min_purchase:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        valid_from:
          type: string
          format: date-time
        valid_to:
          type: string
          format: date-time
        active:
          type: boolean
        usage_limit:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
        times_used:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - discount_value
      - id
      - times_used
      - valid_from
      - valid_to
    CustomTokenObtainPair:
      type: object
      description: Custom serializer to allow login with email and password.
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        email:
          type: string
          format: email
      required:
      - password
    Customer:
      type: object
      description: Read/Write customer details.
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
        first_name:
          type: string
        last_name:
          type: string
        name:
          type: string
          description: Full Name
          maxLength: 200
        email:
          type: string
          format: email
          description: Contact Email
          maxLength: 254
        phone_number:
          type: string
          nullable: true
          maxLength: 20
        customer_type:
          allOf:
          - $ref: '#/components/schemas/CustomerTypeEnum'
          readOnly: true
        avatar:
          type: string
          format: uri
          nullable: true
        social_avatar_url:
          type: string
          format: uri
          nullable: true
          maxLength: 500
        is_wholesaler:
          type: boolean
          readOnly: true
        is_email_verified:
          type: boolean
          readOnly: true
        is_staff:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - customer_type
      - email
      - id
      - is_email_verified
      - is_staff
      - is_wholesaler
      - name
      - user
      - username
    CustomerTypeEnum:
      enum:
      - retail
      - wholesale
      type: string
      description: |-
        * `retail` - Retail Customer
        * `wholesale` - Wholesale Customer
    DiscountTypeEnum:
      enum:
      - percentage
      - fixed
      type: string
      description: |-
        * `percentage` - Percentage
        * `fixed` - Fixed Amount
    District:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        division:
          type: integer
        name:
          type: string
          maxLength: 100
        bn_name:
          type: string
          nullable: true
          maxLength: 100
        lat:
          type: string
          nullable: true
          maxLength: 20
        long:
          type: string
          nullable: true
          maxLength: 20
      required:
      - division
      - id
      - name
    Division:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        bn_name:
          type: string
          nullable: true
          maxLength: 100
        lat:
          type: string
          nullable: true
          maxLength: 20
        long:
          type: string
          nullable: true
          maxLength: 20
      required:
      - id
      - name
    ForgotPassword:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    Logout:
      type: object
      properties:
        refresh:
          type: string
      required:
      - refresh
    Message:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        conversation:
          type: integer
        sender:
          allOf:
          - $ref: '#/components/schemas/UserShort'
          readOnly: true
        guest_id:
          type: string
          nullable: true
          maxLength: 100
        text:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
          readOnly: true
        is_read:
          type: boolean
        reactions:
          type: string
          readOnly: true
        parent_message_id:
          type: integer
          readOnly: true
        image:
          type: string
          format: uri
          nullable: true
        video:
          type: string
          format: uri
          nullable: true
      required:
      - conversation
      - id
      - parent_message_id
      - reactions
      - sender
      - timestamp
    NewsletterSubscription:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        subscribed_at:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
      required:
      - email
      - id
      - is_active
      - subscribed_at
    Notification:
      type: object
      properties:
        id:
