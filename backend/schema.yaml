components:
  schemas:
    Address:
      type: object
      description: Matches the UI screenshot exactly.
      properties:
        id:
          type: integer
          readOnly: true
        full_name:
          type: string
          description: Receiver's Name
          maxLength: 100
        phone:
          type: string
          description: Receiver's Phone
          maxLength: 20
        address:
          type: string
          description: House no. / Building / Street
        division:
          type: string
          maxLength: 100
        district:
          type: string
          maxLength: 100
        sub_district:
          type: string
          maxLength: 100
        address_type:
          $ref: '#/components/schemas/AddressTypeEnum'
        is_default:
          type: boolean
      required:
      - address
      - district
      - division
      - full_name
      - id
      - phone
      - sub_district
    AddressTypeEnum:
      enum:
      - Home
      - Office
      type: string
      description: |-
        * `Home` - Home
        * `Office` - Office
    Brand:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 50
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        logo:
          type: string
          format: uri
          nullable: true
      required:
      - id
      - name
    Cart:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - items
    CartItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          allOf:
          - $ref: '#/components/schemas/OrderProduct'
          readOnly: true
        variant:
          allOf:
          - $ref: '#/components/schemas/OrderVariant'
          readOnly: true
        product_id:
          type: integer
          writeOnly: true
        variant_id:
          type: integer
          writeOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
      required:
      - id
      - product
      - variant
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        logo:
          type: string
          format: uri
          nullable: true
        parent:
          type: integer
          nullable: true
        children:
          type: array
          items:
            $ref: '#/components/schemas/SubCategory'
          readOnly: true
        breadcrumbs:
          type: array
          items:
            type: object
            additionalProperties: {}
          readOnly: true
      required:
      - breadcrumbs
      - children
      - id
      - name
    ChangePassword:
      type: object
      description: Serializer for password change endpoint.
      properties:
        old_password:
          type: string
        new_password:
          type: string
      required:
      - new_password
      - old_password
    Checkout:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        created_at:
          type: string
          format: date-time
          readOnly: true
        cart:
          type: integer
        shipping_address:
          type: integer
          nullable: true
        billing_address:
          type: integer
          nullable: true
      required:
      - cart
      - created_at
      - id
    CustomTokenObtainPair:
      type: object
      description: Custom serializer to allow login with email and password.
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        email:
          type: string
          format: email
      required:
      - password
    Customer:
      type: object
      description: Read/Write customer details.
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
        name:
          type: string
          description: Full Name
          maxLength: 200
        email:
          type: string
          format: email
          description: Contact Email
          maxLength: 254
        phone_number:
          type: string
          nullable: true
          maxLength: 20
        customer_type:
          allOf:
          - $ref: '#/components/schemas/CustomerTypeEnum'
          readOnly: true
        is_wholesaler:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - customer_type
      - email
      - id
      - is_wholesaler
      - name
      - user
      - username
    CustomerTypeEnum:
      enum:
      - retail
      - wholesale
      type: string
      description: |-
        * `retail` - Retail Customer
        * `wholesale` - Wholesale Customer
    District:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        division:
          type: integer
        name:
          type: string
          maxLength: 100
        bn_name:
          type: string
          nullable: true
          maxLength: 100
      required:
      - division
      - id
      - name
    Division:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        bn_name:
          type: string
          nullable: true
          maxLength: 100
      required:
      - id
      - name
    ForgotPassword:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    Logout:
      type: object
      properties:
        refresh:
          type: string
      required:
      - refresh
    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        status:
          type: string
          readOnly: true
        total_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        payment:
          allOf:
          - $ref: '#/components/schemas/PaymentInfo'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        address:
          allOf:
          - $ref: '#/components/schemas/Address'
          readOnly: true
        address_id:
          type: integer
          writeOnly: true
          nullable: true
        address_type:
          type: string
          nullable: true
          description: Home, Office, etc.
          maxLength: 20
        email:
          type: string
          format: email
        full_name:
          type: string
        phone:
          type: string
        shipping_address:
          type: string
        division:
          type: string
        district:
          type: string
        sub_district:
          type: string
        payment_method:
          type: string
          writeOnly: true
        payment_details:
          type: object
          additionalProperties: {}
          writeOnly: true
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          readOnly: true
        items_input:
          type: array
          items:
            type: object
            additionalProperties: {}
          writeOnly: true
      required:
      - address
      - created_at
      - id
      - items
      - payment
      - status
      - total_amount
    OrderItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          allOf:
          - $ref: '#/components/schemas/OrderProduct'
          readOnly: true
        variant:
          allOf:
          - $ref: '#/components/schemas/OrderVariant'
          readOnly: true
        ram:
          type: integer
          readOnly: true
        storage:
          type: integer
          readOnly: true
        color:
          type: string
          readOnly: true
        product_id:
          type: integer
          writeOnly: true
        variant_id:
          type: integer
          writeOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - color
      - id
      - price
      - product
      - ram
      - storage
      - subtotal
      - variant
    OrderProduct:
      type: object
      description: Used inside Orders to show minimal product info.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        price:
          type: string
          readOnly: true
        wholesale_price:
          type: string
          readOnly: true
        image:
          type: string
          nullable: true
          readOnly: true
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - image
      - name
      - price
      - wholesale_price
    OrderVariant:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        sku:
          type: string
          readOnly: true
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        wholesale_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        discount_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        stock_quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        ram:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        storage:
          type: integer
          maximum: 9223372036854775807
