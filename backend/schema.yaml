        Routes:
        GET /api/cart/ -> Returns the User's Cart (with items)
        POST /api/cart/ -> Add Item to Cart
        PUT /api/cart/{id}/ -> Update Item Quantity
        DELETE /api/cart/{id}/ -> Remove Item
        DELETE /api/cart/clear/ -> Clear Cart
      parameters:
      - in: path
        name: id
