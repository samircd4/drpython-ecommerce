services:
  redis_dev:
    image: redis:alpine
    container_name: sarker_redis_dev
    restart: always

  db_dev:
    image: postgres:15-alpine
    container_name: sarker_db_dev
    restart: always
    environment:
      - POSTGRES_DB=sarker_dev
      - POSTGRES_USER=sarker_dev_user
      - POSTGRES_PASSWORD=sarker_dev_pass
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  backend_dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sarker_backend_dev
    restart: always
    networks:
      default:
        aliases:
          - backend-dev # <--- Changed from 'backend' to be unique
    environment:
      - REDIS_URL=redis://redis_dev:6379/0
      - DATABASE_URL=postgres://sarker_dev_user:sarker_dev_pass@db_dev:5432/sarker_dev
      - DEBUG=True
      - DOMAIN=dev.sarker.shop
      - ALLOWED_HOSTS=*
      - CSRF_TRUSTED_ORIGINS=https://dev.sarker.shop
    env_file:
      - ./backend/.env
    depends_on:
      - redis_dev
      - db_dev

  frontend_dev:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: sarker_frontend_dev
    restart: always
    ports:
      - "9090:80"
    environment:
      - BACKEND_HOST=backend-dev # <--- Tell Nginx where to look
    depends_on:
      - backend_dev

volumes:
  postgres_data_dev:
