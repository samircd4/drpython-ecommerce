# =============================================================
# drpython-ecommerce — Unified Docker Compose
# =============================================================
# Copy .env.example to .env and populate all values.
# This single file works for ALL environments and ALL clients.
# Change the variables in .env to switch between modes.
#
# TWO MODES controlled entirely by .env:
#
#   LOCAL DEV  (on your machine):
#     - RESTART_POLICY=no
#     - DEBUG=True
#     - FRONTEND_IMAGE=node:20-alpine
#     - FRONTEND_COMMAND=sh -c "npm install && npm run dev -- --host"
#     - FRONTEND_INTERNAL_PORT=5173
#     - CHOKIDAR_USEPOLLING=true
#
#   SERVER (staging / production):
#     - RESTART_POLICY=always
#     - DEBUG=False
#     - FRONTEND_IMAGE=  (leave blank → build from Dockerfile)
#     - FRONTEND_COMMAND=  (leave blank → Nginx handles it)
#     - FRONTEND_INTERNAL_PORT=80
#     - CHOKIDAR_USEPOLLING=false
#
# USAGE:
#   docker compose up -d --build
# =============================================================

services:

  redis:
    image: redis:alpine
    container_name: ${CLIENT_NAME}_redis
    restart: ${RESTART_POLICY:-no}

  db:
    image: postgres:15-alpine
    container_name: ${CLIENT_NAME}_db
    restart: ${RESTART_POLICY:-no}
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${CLIENT_NAME}_backend_api
    restart: ${RESTART_POLICY:-no}
    command: uv run daphne -b 0.0.0.0 -p 8000 ecommerce_api.asgi:application
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://${CLIENT_NAME}_redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${CLIENT_NAME}_db:5432/${POSTGRES_DB}
      - UV_COMPILE_BYTECODE=${UV_COMPILE_BYTECODE:-1}
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - redis
      - db

  backend_ws:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${CLIENT_NAME}_backend_ws
    restart: ${RESTART_POLICY:-no}
    command: uv run daphne -b 0.0.0.0 -p 8001 ecommerce_api.asgi:application
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://${CLIENT_NAME}_redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${CLIENT_NAME}_db:5432/${POSTGRES_DB}
      - UV_COMPILE_BYTECODE=${UV_COMPILE_BYTECODE:-1}
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "${WS_PORT:-8001}:8001"
    depends_on:
      - redis
      - db

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${CLIENT_NAME}_celery
    restart: ${RESTART_POLICY:-no}
    entrypoint: ["/celery_entrypoint.sh"]
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://${CLIENT_NAME}_redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${CLIENT_NAME}_db:5432/${POSTGRES_DB}
    volumes:
      - backend_media:/app/media
    depends_on:
      - redis
      - db

  frontend:
    # LOCAL:  FRONTEND_IMAGE=node:20-alpine  (no build step, hot-reload)
    # SERVER: FRONTEND_IMAGE=  (blank → build from FRONTEND_CONTEXT/Dockerfile)
    image: ${FRONTEND_IMAGE:-}
    build:
      context: ${FRONTEND_CONTEXT:-./frontend/client}
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID:-}}
    container_name: ${CLIENT_NAME}_frontend
    restart: ${RESTART_POLICY:-no}
    working_dir: /app
    volumes:
      - ${FRONTEND_VOLUME:-./frontend/client}:/app
      - /app/node_modules
      - backend_static:/var/www/static
      - backend_media:/var/www/media
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_INTERNAL_PORT:-5173}"
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_WS_URL=${VITE_WS_URL}
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID:-}}
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING:-false}
      - WATCHPACK_POLLING=${WATCHPACK_POLLING:-false}
    command: ${FRONTEND_COMMAND:-}
    depends_on:
      - backend_api

  admin_dashboard:
    image: node:20-alpine
    container_name: ${CLIENT_NAME}_admin
    restart: ${RESTART_POLICY:-no}
    working_dir: /app
    volumes:
      - ./admin-dashboard:/app
      - /app/node_modules
      - backend_static:/var/www/static
      - backend_media:/var/www/media
    ports:
      - "${ADMIN_PORT:-5174}:${ADMIN_INTERNAL_PORT:-5174}"
    environment:
      - VITE_API_BASE_URL=${VITE_API_URL}
      - VITE_WS_URL=${VITE_WS_URL}
      - VITE_TRACKING_WS_URL=${VITE_WS_URL}
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID:-}}
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING:-false}
      - WATCHPACK_POLLING=${WATCHPACK_POLLING:-false}
    command: ${ADMIN_COMMAND:-sh -c "npm install && npm run dev -- --host --port 5174"}
    depends_on:
      - backend_api

volumes:
  postgres_data:
  backend_static:
  backend_media:
