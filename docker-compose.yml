services:
  redis:
    image: redis:alpine
    restart: always

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=sarker_dev
      - POSTGRES_USER=sarker_user
      - POSTGRES_PASSWORD=sarker_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://sarker_user:sarker_pass@db:5432/sarker_dev
      - DEBUG=True
      - DOMAIN=dev.sarker.shop
      - ALLOWED_HOSTS=*
      - CSRF_TRUSTED_ORIGINS=https://dev.sarker.shop
    env_file:
      - ./.env
    depends_on:
      - redis
      - db

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: /usr/local/bin/uv run celery -A ecommerce_api worker --loglevel=info
    env_file:
      - ./.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://sarker_user:sarker_pass@db:5432/sarker_dev
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    restart: always
    ports:
      - "9090:80"
    depends_on:
      - backend

volumes:
  postgres_data:
