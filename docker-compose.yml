services:
  redis:
    image: redis:alpine
    restart: always

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-sarker_shop}
      - POSTGRES_USER=${POSTGRES_USER:-sarker_prod_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER:-sarker_prod_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sarker_shop}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - FRONTEND_URL=https://${DOMAIN:-sarker.shop}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - ./.env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - redis
      - db

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: /usr/local/bin/uv run celery -A ecommerce_api worker --loglevel=info
    volumes:
      - media_volume:/app/media
    env_file:
      - ./.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER:-sarker_prod_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sarker_shop}
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes:
      - static_volume:/var/www/static
      - media_volume:/var/www/media
    depends_on:
      - backend

volumes:
  static_volume:
  media_volume:
  postgres_data:
