version: '3.8'

services:
    redis:
        image: redis:alpine
        container_name: sarker_redis
        restart: always
        ports:
            - "6379:6379"

    db:
        image: postgres:15-alpine
        container_name: sarker_db
        restart: always
        environment:
            - POSTGRES_DB=sarker_shop
            - POSTGRES_USER=sarker_user
            - POSTGRES_PASSWORD=sarker_pass
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: sarker_backend
        restart: always
        volumes:
            - ./backend:/app
            - backend_static:/app/staticfiles
            - backend_media:/app/media
        environment:
            - REDIS_URL=redis://redis:6379/0
            - DATABASE_URL=postgres://sarker_user:sarker_pass@db:5432/sarker_shop
            - DEBUG=True
            - FRONTEND_URL=http://localhost
        env_file:
            - ./backend/.env
        depends_on:
            - redis
            - db
        ports:
            - "8000:8000"

    celery_worker:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: sarker_celery_worker
        restart: always
        command: /usr/local/bin/uv run celery -A ecommerce_api worker --loglevel=info
        volumes:
            - ./backend:/app
        env_file:
            - ./backend/.env
        environment:
            - REDIS_URL=redis://redis:6379/0
        depends_on:
            - redis
            - backend

    frontend:
        build:
            context: ./front-end
            dockerfile: Dockerfile
        container_name: sarker_frontend
        restart: always
        ports:
            - "80:80"
        volumes:
            - backend_static:/var/www/static
            - backend_media:/var/www/media
        depends_on:
            - backend

volumes:
    backend_static:
    backend_media:
    postgres_data:
