# =============================================================
# drpython-ecommerce — Unified Docker Compose
# =============================================================
# All values come from .env — no defaults are set here.
# Copy .env.example to .env and fill in every variable.
#
# USAGE:
#   Local:  COMPOSE_PROFILES=local  docker compose up -d --build
#   Server: COMPOSE_PROFILES=server docker compose up -d --build
#
# Or set COMPOSE_PROFILES=local in your .env file.
# =============================================================

services:

  redis:
    image: redis:alpine
    container_name: ${CLIENT_NAME}_redis
    restart: ${RESTART_POLICY}

  db:
    image: postgres:15-alpine
    container_name: ${CLIENT_NAME}_db
    restart: ${RESTART_POLICY}
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${CLIENT_NAME}_backend_api
    restart: ${RESTART_POLICY}
    command: uv run daphne -b 0.0.0.0 -p 8000 ecommerce_api.asgi:application
    env_file:
      - .env
    environment:
      # Use service names (redis, db) for Docker internal networking
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      - redis
      - db

  backend_ws:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${CLIENT_NAME}_backend_ws
    restart: ${RESTART_POLICY}
    command: uv run daphne -b 0.0.0.0 -p 8001 ecommerce_api.asgi:application
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "${WS_PORT}:8001"
    depends_on:
      - redis
      - db

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${CLIENT_NAME}_celery
    restart: ${RESTART_POLICY}
    entrypoint: ["/celery_entrypoint.sh"]
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - backend_media:/app/media
    depends_on:
      - redis
      - db

  # -----------------------------------------------------------
  # LOCAL profile — hot-reload via node image (no Docker build)
  # Activate with: COMPOSE_PROFILES=local in .env
  # -----------------------------------------------------------
  frontend_local:
    profiles: ["local"]
    image: node:20-alpine
    container_name: ${CLIENT_NAME}_frontend
    restart: ${RESTART_POLICY}
    working_dir: /app
    volumes:
      - ${FRONTEND_VOLUME}:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT}:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_WS_URL=${VITE_WS_URL}
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend_api

  admin_local:
    profiles: ["local"]
    image: node:20-alpine
    container_name: ${CLIENT_NAME}_admin
    restart: ${RESTART_POLICY}
    working_dir: /app
    volumes:
      - ./admin-dashboard:/app
      - /app/node_modules
    ports:
      - "${ADMIN_PORT}:5174"
    environment:
      - VITE_API_BASE_URL=${VITE_API_URL}
      - VITE_WS_URL=${VITE_WS_URL}
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: sh -c "npm install && npm run dev -- --host --port 5174"
    depends_on:
      - backend_api

  # -----------------------------------------------------------
  # SERVER profile — builds static Nginx image from Dockerfile
  # Activate with: COMPOSE_PROFILES=server in .env
  # -----------------------------------------------------------
  frontend_server:
    profiles: ["server"]
    build:
      context: ${FRONTEND_CONTEXT}
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: ${CLIENT_NAME}_frontend
    restart: ${RESTART_POLICY}
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - backend_static:/var/www/static
      - backend_media:/var/www/media
    depends_on:
      - backend_api

  admin_server:
    profiles: ["server"]
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: ${CLIENT_NAME}_admin
    restart: ${RESTART_POLICY}
    ports:
      - "${ADMIN_PORT}:80"
    volumes:
      - backend_static:/var/www/static
      - backend_media:/var/www/media
    depends_on:
      - backend_api

volumes:
  postgres_data:
  backend_static:
  backend_media:
