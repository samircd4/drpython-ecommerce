server {
    listen 80;
    server_name _;

    # Allow large file uploads (100MB)
    client_max_body_size 100M;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        # Use 'backend' as default, but allows override via logic
        set $backend_host backend;
        if ($host ~* "dev.sarker.shop") {
            set $backend_host backend-dev;
        }
        
        proxy_pass http://$backend_host:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Django Admin
    location /admin/ {
        set $backend_host backend;
        if ($host ~* "dev.sarker.shop") {
            set $backend_host backend-dev;
        }

        proxy_pass http://$backend_host:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve Static Files for Django (Admin/DRF)
    location /static/ {
        alias /var/www/static/;
    }

    # Serve Media Files
    location /media/ {
        alias /var/www/media/;
    }
}
