# =============================================================
# Nginx Config for dev.sarker.shop (STAGING / DEV)
# =============================================================
# Deploy path on VPS: /etc/nginx/sites-available/dev.sarker.shop
# Enable with: ln -s /etc/nginx/sites-available/dev.sarker.shop /etc/nginx/sites-enabled/
# Reload with: nginx -t && systemctl reload nginx
# =============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name dev.sarker.shop www.dev.sarker.shop;
    return 301 https://$host$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl;
    server_name dev.sarker.shop;

    ssl_certificate /etc/letsencrypt/live/dev.sarker.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.sarker.shop/privkey.pem;

    client_max_body_size 100M;

    # [CRITICAL] Priority WebSocket block (stops Nginx from searching further)
    location ^~ /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # Serve Django admin static files
    location /static/ {
        proxy_pass http://127.0.0.1:9090/static/;
        proxy_http_version 1.1;
    }

    # Serve uploaded media files
    location /media/ {
        proxy_pass http://127.0.0.1:9090/media/;
        proxy_http_version 1.1;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Proxy Django admin to backend
    location /admin/ {
        proxy_pass http://127.0.0.1:8000/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Proxy everything else to the frontend (React app)
    location / {
        proxy_pass http://127.0.0.1:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
