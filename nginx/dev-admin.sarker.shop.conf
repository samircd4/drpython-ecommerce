# =============================================================
# Nginx Config for dev-admin.sarker.shop (DEV ADMIN)
# =============================================================
# Deploy path on VPS: /etc/nginx/sites-available/dev-admin.sarker.shop
# Enable with: ln -s /etc/nginx/sites-available/dev-admin.sarker.shop /etc/nginx/sites-enabled/
# Reload with: nginx -t && systemctl reload nginx
# =============================================================

# Main server block
server {
    server_name dev-admin.sarker.shop;

    # TEMP: Commented out for initial SSL generation
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/dev-admin.sarker.shop/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dev-admin.sarker.shop/privkey.pem;

    client_max_body_size 100M;

    # Proxy everything to the admin_dashboard container (dev port 9091)
    location / {
        proxy_pass http://127.0.0.1:9091;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/dev-admin.sarker.shop/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/dev-admin.sarker.shop/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = dev-admin.sarker.shop) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name dev-admin.sarker.shop;
    return 404; # managed by Certbot


}