# =============================================================
# Nginx Config for api.gurudebenterprise.com (PRODUCTION API)
# =============================================================
# Deploy path on VPS: /etc/nginx/sites-available/api.gurudeb.conf
# Enable with: ln -s /etc/nginx/sites-available/api.gurudeb.conf /etc/nginx/sites-enabled/
# Reload with: nginx -t && systemctl reload nginx
# =============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.gurudebenterprise.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl;
    server_name api.gurudebenterprise.com;

    # SSL configuration (Certbot will manage these)
    ssl_certificate /etc/letsencrypt/live/api.gurudebenterprise.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.gurudebenterprise.com/privkey.pem;

    client_max_body_size 100M;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # WebSocket connection
    location /ws/ {
        proxy_pass http://127.0.0.1:8012; # WS_PORT
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # Serve static files for django admin (proxied directly to Django where WhiteNoise is active)
    location /static/ {
        proxy_pass http://127.0.0.1:8002/static/; # BACKEND_PORT
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
    }

    # Serve media uploads
    location /media/ {
        proxy_pass http://127.0.0.1:5175/media/; # FRONTEND_PORT
        proxy_http_version 1.1;
    }

    # Proxy everything else (including django admin /admin/) to the Django backend
    location / {
        proxy_pass http://127.0.0.1:8002; # BACKEND_PORT
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
