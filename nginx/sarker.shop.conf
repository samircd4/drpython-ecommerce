# =============================================================
# Nginx Config for sarker.shop (PRODUCTION)
# =============================================================
# Deploy path on VPS: /etc/nginx/sites-available/sarker.shop
# Enable with: ln -s /etc/nginx/sites-available/sarker.shop /etc/nginx/sites-enabled/
# Reload with: nginx -t && systemctl reload nginx
# =============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name sarker.shop www.sarker.shop;
    return 301 https://$host$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl;
    server_name sarker.shop www.sarker.shop;

    ssl_certificate /etc/letsencrypt/live/sarker.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sarker.shop/privkey.pem;

    client_max_body_size 100M;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Serve Django admin static files
    location /static/ {
        proxy_pass http://localhost:8081/static/;
    }

    # Serve uploaded media files
    location /media/ {
        proxy_pass http://localhost:8081/media/;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://localhost:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Django admin to backend
    location /admin/ {
        proxy_pass http://localhost:8001/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy everything else to the frontend (React app)
    location / {
        proxy_pass http://localhost:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
