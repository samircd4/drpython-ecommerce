# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name admin.gurudebenterprise.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl;
    server_name admin.gurudebenterprise.com;

    # SSL configuration (Certbot will manage these)
    ssl_certificate /etc/letsencrypt/live/admin.gurudebenterprise.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.gurudebenterprise.com/privkey.pem;

    client_max_body_size 100M;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass http://127.0.0.1:5176; # ADMIN_PORT
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
