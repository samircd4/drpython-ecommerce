# =============================================================
# Nginx Config for admin.sarker.shop (PRODUCTION ADMIN)
# =============================================================
# Deploy path on VPS: /etc/nginx/sites-available/admin.sarker.shop
# Enable with: ln -s /etc/nginx/sites-available/admin.sarker.shop /etc/nginx/sites-enabled/
# Reload with: nginx -t && systemctl reload nginx
# =============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name admin.sarker.shop;
    return 301 https://$host$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl;
    server_name admin.sarker.shop;

    # SSL configuration (Certbot will update these)
    ssl_certificate /etc/letsencrypt/live/admin.sarker.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.sarker.shop/privkey.pem;

    client_max_body_size 100M;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Proxy everything to the admin_dashboard container (prod port 8082)
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
