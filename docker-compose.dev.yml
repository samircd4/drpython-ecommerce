services:
  redis:
    image: redis:alpine
    restart: always

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data

  backend_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: uv run daphne -b 0.0.0.0 -p 8000 ecommerce_api.asgi:application
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - dev_static:/app/staticfiles
      - dev_media:/app/media
    ports:
      - "8010:8000"
    depends_on:
      - redis
      - db

  backend_ws:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: uv run daphne -b 0.0.0.0 -p 8001 ecommerce_api.asgi:application
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - dev_static:/app/staticfiles
      - dev_media:/app/media
    ports:
      - "8011:8001"
    depends_on:
      - redis
      - db

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    entrypoint: ["/celery_entrypoint.sh"]
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - dev_media:/app/media
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID}}
    restart: always
    ports:
      - "${FRONTEND_PORT:-9090}:80"
    volumes:
      - dev_static:/var/www/static
      - dev_media:/var/www/media
    depends_on:
      - backend_api

  admin_dashboard:
    build:
      context: ./Admin-Dashboard
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
    restart: always
    ports:
      - "${ADMIN_PORT:-9091}:80"
    depends_on:
      - backend_api

volumes:
  dev_postgres_data:
  dev_static:
  dev_media:

