services:
  redis:
    image: redis:alpine
    restart: always

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data

  backend_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: uv run daphne -b 0.0.0.0 -p 8000 ecommerce_api.asgi:application
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DOMAIN=${DOMAIN}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - FRONTEND_URL=${FRONTEND_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_SECRET=${GOOGLE_SECRET}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    volumes:
      - prod_static:/app/staticfiles
      - prod_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db

  backend_ws:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: uv run daphne -b 0.0.0.0 -p 8001 ecommerce_api.asgi:application
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DOMAIN=${DOMAIN}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - FRONTEND_URL=${FRONTEND_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_SECRET=${GOOGLE_SECRET}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    volumes:
      - prod_static:/app/staticfiles
      - prod_media:/app/media
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - db


  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    entrypoint: ["/celery_entrypoint.sh"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_SECRET=${GOOGLE_SECRET}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    volumes:
      - prod_media:/app/media
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID}}
    restart: always
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    volumes:
      - prod_static:/var/www/static
      - prod_media:/var/www/media
    depends_on:
      - backend_api

  admin_dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID}}
    restart: always
    ports:
      - "${ADMIN_PORT:-8082}:80"
    volumes:
      - prod_static:/var/www/static
      - prod_media:/var/www/media
    depends_on:
      - backend_api


volumes:
  prod_postgres_data:
  prod_static:
  prod_media:
