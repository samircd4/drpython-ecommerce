services:
  redis:
    image: redis:alpine
    restart: always
    # No ports exposed to host in production for security, use internal network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-sarker_shop}
      - POSTGRES_USER=${POSTGRES_USER:-sarker_prod_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    # No ports exposed to host in production

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    volumes:
      - backend_static_prod:/app/staticfiles
      - backend_media_prod:/app/media
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER:-sarker_prod_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sarker_shop}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - FRONTEND_URL=https://${DOMAIN:-localhost}
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - db

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: /usr/local/bin/uv run celery -A ecommerce_api worker --loglevel=info
    volumes:
      - backend_media_prod:/app/media
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://${POSTGRES_USER:-sarker_prod_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sarker_shop}
    depends_on:
      - redis
      - db
      - backend

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    restart: always
    ports:
      - "8080:80"
    volumes:
      - backend_static_prod:/var/www/static
      - backend_media_prod:/var/www/media
    depends_on:
      - backend

volumes:
  backend_static_prod:
  backend_media_prod:
  postgres_data_prod:
