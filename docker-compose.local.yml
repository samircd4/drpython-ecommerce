services:
  redis:
    image: redis:alpine
    container_name: sarker_redis_local

  db:
    image: postgres:15-alpine
    container_name: sarker_db_local
    environment:
      - POSTGRES_DB=sarker_shop
      - POSTGRES_USER=sarker_user
      - POSTGRES_PASSWORD=sarker_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data

  backend_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sarker_backend_api_local
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/.venv
      - backend_static_local:/app/staticfiles
      - backend_media_local:/app/media
    environment:
      - REDIS_URL=redis://sarker_redis_local:6379/0
      - DATABASE_URL=postgres://sarker_user:sarker_pass@sarker_db_local:5432/sarker_shop
      - DEBUG=True
      - DOMAIN=localhost
      - ALLOWED_HOSTS=*
      - FRONTEND_URL=http://localhost:5173
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_SECRET=${GOOGLE_SECRET:-}
      - UV_COMPILE_BYTECODE=0
    command: uv run daphne -b 0.0.0.0 -p 8000 ecommerce_api.asgi:application
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db

  backend_ws:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sarker_backend_ws_local
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/.venv
      - backend_static_local:/app/staticfiles
      - backend_media_local:/app/media
    environment:
      - REDIS_URL=redis://sarker_redis_local:6379/0
      - DATABASE_URL=postgres://sarker_user:sarker_pass@sarker_db_local:5432/sarker_shop
      - DEBUG=True
      - DOMAIN=localhost
      - ALLOWED_HOSTS=*
      - FRONTEND_URL=http://localhost:5173
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_SECRET=${GOOGLE_SECRET:-}
      - UV_COMPILE_BYTECODE=0
    command: uv run daphne -b 0.0.0.0 -p 8001 ecommerce_api.asgi:application
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - db


  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sarker_celery_local
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/.venv
    command: uv run celery -A ecommerce_api worker --loglevel=info
    environment:
      - REDIS_URL=redis://sarker_redis_local:6379/0
      - DATABASE_URL=postgres://sarker_user:sarker_pass@sarker_db_local:5432/sarker_shop
      - DEBUG=True
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_SECRET=${GOOGLE_SECRET:-}
    depends_on:
      - redis
      - db

  frontend:
    image: node:20-alpine # Use node image directly for dev
    container_name: sarker_frontend_local
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: sh -c "npm install && npm run dev -- --host"

  admin_dashboard:
    image: node:20-alpine
    container_name: sarker_admin_local
    working_dir: /app
    volumes:
      - ./Admin-Dashboard:/app
      - /app/node_modules
    ports:
      - "5174:5174"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
      - VITE_WS_URL=ws://localhost:8001/ws/chat/
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: sh -c "npm install && npm run dev -- --host --port 5174"
    depends_on:
      - backend_api


volumes:
  postgres_data_local:
  backend_static_local:
  backend_media_local:
