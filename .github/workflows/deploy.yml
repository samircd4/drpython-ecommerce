name: Deploy

on:
  push:
    branches: [dev, prod]

env:
  HEALTH_CHECK_RETRIES: 5

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false

  test-frontend:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false

  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 300s
          script: |
            bash -e << 'EOF'
            BRANCH="${{ github.ref_name }}"
            if [ "$BRANCH" = "prod" ]; then
              DIR="$HOME/sarker_prod"
              FILE="docker-compose.prod.yml"
            else
              DIR="$HOME/sarker_dev"
              FILE="docker-compose.dev.yml"
            fi

            echo "Deploying $BRANCH..."
            cd $DIR
            git fetch origin $BRANCH
            git reset --hard origin/$BRANCH
            docker compose -f $FILE up -d --build

            # Health check
            echo "Running health checks..."
            RETRY=0
            while [ $RETRY -lt ${{ env.HEALTH_CHECK_RETRIES }} ]; do
              RUNNING=$(docker compose -f $FILE ps --services --filter "status=running" | wc -l)
              TOTAL=$(docker compose -f $FILE ps --services | wc -l)
              if [ $RUNNING -eq $TOTAL ] && [ $TOTAL -gt 0 ]; then
                echo "✅ All containers running ($RUNNING/$TOTAL)"
                break
              fi
              RETRY=$((RETRY + 1))
              if [ $RETRY -lt ${{ env.HEALTH_CHECK_RETRIES }} ]; then
                sleep 5
              fi
            done

            if [ $RETRY -eq ${{ env.HEALTH_CHECK_RETRIES }} ]; then
              echo "Health check failed"
              docker compose -f $FILE logs --tail=100
              exit 1
            fi

            docker compose -f $FILE ps
            EOF
